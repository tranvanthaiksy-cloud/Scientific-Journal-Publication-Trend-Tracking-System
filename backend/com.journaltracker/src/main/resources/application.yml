server:
  port: 8080
jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForJwtAuthenticationSpringBootProject2026VerySecureSecretKey}
  expiration: ${JWT_EXPIRATION:86400000}
spring:
  config:
    import:
      - optional:file:.env[.properties]
  application:
    name: journal-trend-tracker
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/journal_tracker_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
logging:
  level:
    org.springframework.web: INFO
    com.journaltracker: DEBUG
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
external-api:
  openalex:
    base-url: https://api.openalex.org
    email: ${OPENALEX_EMAIL:tranvanthai20062@gmail.com}
    per-page: 25
  crossref:
    base-url: https://api.crossref.org
    user-agent: JournalTracker/1.0 (mailto:${OPENALEX_EMAIL:tranvanthai20062@gmail.com})
    rows: 25

sync:
  cron: ${SYNC_CRON:0 0 13 * * ?}
  enabled: ${SYNC_ENABLED:true}
  default-query: ${SYNC_DEFAULT_QUERY:machine learning}
  max-pages-per-sync: ${SYNC_MAX_PAGES:10}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://scientifictrend.vercel.app/}
