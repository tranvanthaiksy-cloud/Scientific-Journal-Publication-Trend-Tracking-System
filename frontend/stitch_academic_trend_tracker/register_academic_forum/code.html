<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Academic Forum</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;family=Source+Serif+4:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#2d3133",
                    "secondary-container": "#86f2e4",
                    "surface-dim": "#d8dadc",
                    "tertiary-fixed": "#d3e4fe",
                    "surface-container": "#eceef0",
                    "primary-container": "#131b2e",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f2f4f6",
                    "tertiary-fixed-dim": "#b7c8e1",
                    "surface-bright": "#f7f9fb",
                    "tertiary": "#000000",
                    "secondary-fixed": "#89f5e7",
                    "on-primary-container": "#7c839b",
                    "surface-tint": "#565e74",
                    "surface-variant": "#e0e3e5",
                    "secondary": "#006a61",
                    "on-tertiary-fixed": "#0b1c30",
                    "primary-fixed-dim": "#bec6e0",
                    "on-primary-fixed-variant": "#3f465c",
                    "surface": "#f7f9fb",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#00201d",
                    "on-surface": "#191c1e",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#dae2fd",
                    "on-primary-fixed": "#131b2e",
                    "on-secondary-container": "#006f66",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#6bd8cb",
                    "on-primary": "#ffffff",
                    "primary": "#000000",
                    "outline": "#76777d",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "tertiary-container": "#0b1c30",
                    "on-tertiary-container": "#75859d",
                    "on-secondary-fixed-variant": "#005049",
                    "on-surface-variant": "#45464d",
                    "outline-variant": "#c6c6cd",
                    "on-tertiary-fixed-variant": "#38485d",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "background": "#f7f9fb",
                    "on-background": "#191c1e",
                    "inverse-primary": "#bec6e0"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "container-max": "1440px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "unit": "4px",
                    "sidebar-width": "260px",
                    "margin-desktop": "40px"
            },
            "fontFamily": {
                    "body-sm": ["Work Sans"],
                    "body-md": ["Work Sans"],
                    "ui-label": ["Work Sans"],
                    "headline-lg": ["\"Source Serif 4\""],
                    "data-label": ["JetBrains Mono"],
                    "headline-lg-mobile": ["\"Source Serif 4\""],
                    "paper-title": ["\"Source Serif 4\""],
                    "display-title": ["\"Source Serif 4\""]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "ui-label": ["13px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-lg": ["30px", {"lineHeight": "38px", "fontWeight": "600"}],
                    "data-label": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "paper-title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "display-title": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus {
            outline: none;
            border-bottom-color: #006a61; /* Secondary/Teal accent from config */
        }
        body {
            background-color: #f7f9fb;
        }
        /* Custom scrollbar for academic feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e0e3e5; border-radius: 10px; }
    </style>
</head>
<body class="font-body-md text-on-surface flex min-h-screen items-center justify-center p-6">
<!-- Atmospheric background (Optional subtle shader effect) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">

</div>
<!-- Main Register Container -->
<main class="w-full max-w-lg bg-surface-container-lowest border border-outline-variant p-10 md:p-12 shadow-sm">
<!-- Header: Logo & Branding -->
<header class="flex flex-col items-center mb-10">
<div class="mb-4 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-display-title text-display-title text-primary tracking-tight">Academic Forum</h1>
<p class="font-body-sm text-on-surface-variant mt-2 text-center">Join the global network of researchers and scholars</p>
</header>
<!-- Registration Form -->
<form class="space-y-6" id="registerForm">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Username -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="username">Username</label>
<input class="w-full border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200" id="username" name="username" placeholder="jdoe_academic" required="" type="text"/>
</div>
<!-- Full Name -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="fullname">Full Name</label>
<input class="w-full border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200" id="fullname" name="fullname" placeholder="Dr. John Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="email">Email Address</label>
<input class="w-full border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200" id="email" name="email" placeholder="john.doe@university.edu" required="" type="email"/>
</div>
<!-- Role Selection (Dropdown) -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="role">Professional Role</label>
<div class="relative">
<select class="w-full appearance-none border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200 cursor-pointer" id="role" name="role" required="">
<option disabled="" selected="" value="">Select your role</option>
<option value="Researcher">Researcher</option>
<option value="Lecturer">Lecturer</option>
<option value="Student">Student</option>
</select>
<div class="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Password -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="password">Password</label>
<input class="w-full border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200" id="password" name="password" required="" type="password"/>
</div>
<!-- Confirm Password -->
<div class="relative">
<label class="block font-ui-label text-ui-label text-on-surface-variant mb-1" for="confirm_password">Confirm Password</label>
<input class="w-full border-0 border-b-2 border-outline-variant bg-transparent py-2 px-0 font-body-md form-input-focus transition-all duration-200" id="confirm_password" name="confirm_password" required="" type="password"/>
</div>
</div>
<!-- Terms (Implicit for academic sites usually) -->
<div class="flex items-start pt-2">
<input class="mt-1 h-4 w-4 rounded border-outline text-secondary focus:ring-secondary" id="terms" name="terms" required="" type="checkbox"/>
<label class="ml-3 font-body-sm text-on-surface-variant" for="terms">
                    I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-4 font-ui-label text-ui-label tracking-widest uppercase hover:bg-primary-container transition-all duration-300 transform active:scale-95 shadow-lg" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Actions -->
<footer class="mt-10 pt-8 border-t border-outline-variant flex flex-col items-center space-y-4">
<p class="font-body-sm text-on-surface-variant">Already have an account?</p>
<a class="font-ui-label text-ui-label text-primary border border-primary px-8 py-2 hover:bg-surface-container-low transition-colors duration-200" href="login.html">
                Sign In
            </a>
</footer>
</main>
<!-- Side Decoration (Visual Anchor) -->
<div class="hidden lg:flex fixed right-margin-desktop top-1/2 -translate-y-1/2 flex-col space-y-8 items-end pointer-events-none select-none">
<div class="text-right">
<span class="font-data-label text-data-label text-secondary tracking-widest uppercase mb-2 block">System Integrity</span>
<div class="h-[1px] w-32 bg-outline-variant mb-2"></div>
<p class="font-body-sm text-on-surface-variant italic max-w-xs">"Advancing research through collaborative tracking."</p>
</div>
<div class="opacity-10">
<span class="material-symbols-outlined text-[160px]">menu_book</span>
</div>
</div>
<script>
        // Micro-interaction for form validation/password match
        const form = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirm_password');

        form.addEventListener('submit', (e) => {
            if (password.value !== confirm.value) {
                e.preventDefault();
                confirm.classList.add('border-error');
                alert('Passwords do not match. Please verify your input.');
            }
        });

        // Clear error style on input
        confirm.addEventListener('input', () => {
            confirm.classList.remove('border-error');
        });

        // Atmosphere interaction (subtle follow for mouse on the background shader if supported by the container)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            // This is purely decorative, some shaders might respond to CSS variables
            document.documentElement.style.setProperty('--mouse-x', x);
            document.documentElement.style.setProperty('--mouse-y', y);
        });
    </script>
</body></html>
